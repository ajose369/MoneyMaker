# toonpipe global configuration.
# Per-project overrides can be placed in projects/<slug>/config.yaml

# --- Content ---
# content_type drives the whole script engine:
#   explainer — curiosity/facts video (Jitzz Media style): one narrator voiceover,
#               question-hook title ("How do dogs know an earthquake is coming? 😱"),
#               animated illustrations of real, verifiable facts.
#   story     — character-driven kids' moral fable with dialogue (the original mode).
content_type: explainer
language: English            # English | Hindi | Malayalam | Tamil
genre: "curiosity facts explainer"   # used for topic generation and music pick
audience: "curious viewers and families"
scene_count: 10              # ~20-35s of narration per scene -> 4-6 min videos
style: "flat 2D cel-shaded cartoon, thick black outlines, flat matte colors, storybook illustration style"

# --- Video ---
aspect_ratio: "16:9"         # "16:9" (long-form) or "9:16" (shorts)
width: 1920
height: 1080
fps: 30
video_backend: kenburns      # kenburns (free, image+motion) | veo (paid API video)

# --- Image generation ---
# local_sd: $0, fully local (Stable Diffusion XL + IP-Adapter, runs on your GPU).
#   Character/environment consistency is weaker than Gemini's reference-image
#   conditioning — expect more image_qc regenerations on multi-character scenes.
# gemini: needs a Google Cloud BILLING ACCOUNT linked (the no-billing free tier
#   gives 0 requests/day for image-output models — re-verified 2026-07-14:
#   'limit: 0' 429s on all keys). ~$0.04-0.15/image but stronger consistency.
# flow: $0, Imagen-quality via Google Flow (labs.google/fx/tools/flow) + the
#   ZAPI FLOW Chrome extension — ONE ~2-min manual step per video: the stage
#   halts after writing flow_prompts.txt; paste it into the extension (serial
#   numbers ON), move the auto-downloads into <project>/flow_inbox/, re-run.
#   Text prompts only (no reference conditioning) and imported images skip
#   vision QC.
# flow_auto: $0, same Flow images but FULLY automated — Playwright drives your
#   installed Chrome (separate profile). One-time setup:
#     pip install playwright && python -m toonpipe flow-login
#   Gray area under Google's ToS (UI automation) — a dedicated Google account
#   is recommended. Vision QC stays active in this mode.
image_backend: flow_auto
flow_inbox: flow_inbox       # flow backend: folder inside the project dir watched for downloads
flow_profile_dir: .flow_profile   # flow_auto: browser profile holding the Google sign-in
# flow_project_url: ""       # flow_auto: reuse one Flow project (recommended — open it
                             # once, set output type to Image; the setting persists)
flow_headless: false         # true = no browser window at all (slightly higher
                             # anti-bot detection risk); test before relying on it
flow_offscreen: true         # safer invisibility: real Chrome window parked far
                             # off-screen — you won't see it, Google can't tell
flow_min_gap_s: 12           # flow_auto: polite random delay between generations
flow_max_gap_s: 30
# Batching stretches the free account's daily agent-message quota: ask for N
# images in ONE message instead of one message each (~3-4x more images/day).
# 1 = disabled (one image per message; the proven default). Batched images
# still pass vision QC; a batch returning the wrong count falls back to
# per-image automatically. VALIDATE gallery order live before raising above 1.
flow_batch_size: 1           # try 3-4 once verified; keep 1 for guaranteed style match
flow_batch_reverse: false    # set true if a live check shows the gallery lists newest-first
local_sd_model: stabilityai/stable-diffusion-xl-base-1.0
local_sd_device: cuda        # cuda | cpu (cpu works but is very slow)
local_sd_steps: 28
local_sd_guidance: 6.5
local_sd_ip_adapter_scale: 0.55   # 0=ignore references, 1=strong copy; 0.4-0.7 typical

# --- Audio ---
tts_engine: edge             # edge (free cloud, default) | omnivoice (local, needs
                             # OmniVoice-Studio running; falls back to edge automatically)
# narrator_voice: ml-IN-MidhunNeural   # optional edge-tts voice override for the
                             # narrator (default for Malayalam is the female
                             # ml-IN-SobhanaNeural; MidhunNeural is the male voice)
tts_rate: "-5%"              # edge-tts speaking rate adjustment
line_gap_ms: 400             # silence between dialogue lines
music_dir: "assets/music"    # drop royalty-free tracks here — see assets/music/README.md
music_volume: 0.13
subtitles: burn              # burn | srt | none

# OmniVoice-Studio (https://github.com/debpalash/OmniVoice-Studio) — optional local TTS
omnivoice_url: "http://localhost:3900/v1"
omnivoice_model: omnivoice
omnivoice_voices:            # map voice archetypes to OmniVoice voice/clone names
  default: "default"
  # narrator: "my-cloned-narrator"
  # child_male: "..."

# --- Quality (all automatic; no human intervention) ---
quality_gate: auto           # auto = Claude self-reviews the script
image_qc: true               # Claude vision approves/regenerates each image
image_qc_max_retries: 2

# --- Models ---
# llm_provider drives story writing, self-review, metadata, and image QC:
#   nvidia — $0 on build.nvidia.com's free NIM catalogue (needs NVIDIA_API_KEY
#            in .env). Large models and, unlike Gemini's free tier, no 5xx
#            storms. Image QC still uses Gemini vision (free) in this mode.
#   gemini — $0 on the free-tier key pool in .env, but the free tier throws
#            frequent transient 5xx: measured 2026-07-16, retries burned 40+
#            minutes on a single script before succeeding.
#   ollama — fully local; run `ollama pull qwen3:8b` first.
#            Tested 2026-07-14: qwen3:8b's Malayalam writing is NOT publishable
#            (wrong subject, duplicated lines, ignores English-only prompt
#            rules) — fine for plumbing tests, not for real videos.
#   claude — best writing quality; needs ANTHROPIC_API_KEY in .env
llm_provider: nvidia
# Verified on the free tier 2026-07-16. Many catalogue entries return an
# instant 404 'not found for account' despite being listed, and reasoning-only
# models return empty content — these three answer in plain content:
#   qwen/qwen3.5-122b-a10b (1.2s)  openai/gpt-oss-120b  mistralai/mistral-medium-3.5-128b
nvidia_model: qwen/qwen3.5-122b-a10b
nvidia_url: "https://integrate.api.nvidia.com/v1"
claude_model: claude-opus-4-8
gemini_text_model: gemini-3.5-flash
ollama_model: qwen3:8b       # fits the 8GB RTX 5060; llama3.1:8b also works
ollama_url: "http://localhost:11434"
gemini_image_model: gemini-3.1-flash-image   # Nano Banana 2; gemini-3-pro-image = max quality (4K)
veo_model: veo-3.1-lite-generate-preview     # or veo-3.1-generate-preview (higher quality, pricier)

# --- Publishing ---
publish:
  enabled: true
  privacy: private           # public | private | unlisted  (private = safety net: review in
                             # YouTube Studio and flip to public manually)
  category_id: "27"          # 27 = Education (explainers); use 1 = Film & Animation for story mode
  made_for_kids: false       # explainers target a general audience; set true for kids' stories
  client_secrets: "client_secret.json"   # OAuth desktop-app credentials from Google Cloud Console
  token_file: "yt_token.json"

# --- Cost controls ---
max_cost_usd_per_video: 3.00   # abort autopilot if the ledger crosses this
